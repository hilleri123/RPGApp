services:
  app:
    build:
      context: ./RPGdata
      target: dev
    restart: unless-stopped
    environment:
      BASE_URL: http://localhost:6602/api
      PG_ENDPOINT: postgresql://db:5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rpg_sessions
      SECRET_KEY: ${SECRET_KEY}
      ENV: development
      BOT_TOKEN: ${BOT_TOKEN}
      ROOT_PATH: /api
    ports:
      - "6601:8000"
    volumes:
      - ./RPGdata:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy


  web-client:
    build:
      context: ./RPGWebMainClient
      target: dev
    restart: unless-stopped
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "6602:3000"
    volumes:
      - ./RPGWebMainClient:/app
      - /app/node_modules
    depends_on:
      - app


  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rpg_sessions
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "6603:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  pg-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: rpg_sessions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_COMPRESSION: gzip
      TZ: Europe/Moscow
    volumes:
      - ./backups:/backups


  redis:
    image: redis/redis-stack:latest
    restart: unless-stopped
    volumes:
      - redis_data:/redis_data
    ports:
      - "6606:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10


volumes:
  postgres_data:
  media_data:
  redis_data:
